<div class="settings-card">
  <div class="settings-card__header">
    <div class="settings-card__icon-wrap">
      <lucide-icon name="bell" [size]="18" class="settings-card__icon"></lucide-icon>
    </div>
    <div>
      <h2 class="settings-card__title">Notifications</h2>
      <p class="settings-card__desc">Manage notification preferences</p>
    </div>
  </div>
  <div class="settings-card__body">
    @for (opt of notificationOptions(); track opt.label; let i = $index) {
      <label class="checkbox-label">
        <input
          type="checkbox"
          [checked]="opt.checked"
          (change)="toggleOption(i)"
          class="checkbox-input"
        />
        <span class="checkbox-text">{{ opt.label }}</span>
      </label>
    }
  </div>
</div>

<button (click)="saveChanges()" class="save-btn">
  <lucide-icon name="save" [size]="16"></lucide-icon>
  <span>Save Changes</span>
</button>
