<div class="settings">
  <div class="container-fluid">

    <!-- Header -->
    <div class="row mb-4">
      <div class="col-12">
        <h1 class="settings__title">Settings</h1>
        <p class="settings__subtitle">Manage your account preferences and integrations</p>
      </div>
    </div>

    <!-- Tabs Navigation -->
    <div class="settings-tabs">
      @for (tab of tabs; track tab.path) {
        <a
          [routerLink]="tab.path"
          routerLinkActive="settings-tabs__btn--active"
          class="settings-tabs__btn"
        >
          <lucide-icon [name]="tab.icon" [size]="16"></lucide-icon>
          {{ tab.label }}
        </a>
      }
    </div>

    <!-- Tab Content via Router -->
    <div class="col-12 mt-4">
      <router-outlet />
    </div>

  </div>
</div>
