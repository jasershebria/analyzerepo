@if (repositories().length > 0) {
  <div class="repo-grid">
    @for (repo of repositories(); track repo.id) {
      <button (click)="selectRepo(repo)" class="repo-card">
        <div class="repo-card__top">
          <div class="repo-card__icon">
            <lucide-icon name="github" [size]="24" class="repo-card__svg"></lucide-icon>
          </div>
          <div class="repo-card__info">
            <h3 class="repo-card__name">{{ repo.name }}</h3>
            <p class="repo-card__url">{{ repo.url.replace('https://', '') }}</p>
          </div>
        </div>
        <p class="repo-card__date">Added {{ repo.addedAt | date }}</p>
      </button>
    }

    <!-- Add new card -->
    <button (click)="navigateToSettings()" class="repo-card repo-card--add">
      <div class="repo-card--add__inner">
        <div class="repo-card--add__icon">
          <lucide-icon name="plus" [size]="24" class="repo-card--add__svg"></lucide-icon>
        </div>
        <span class="repo-card--add__label">Add Repository</span>
      </div>
    </button>
  </div>
} @else {
  <!-- Empty State -->
  <div class="repo-empty">
    <div class="repo-empty__icon">
      <lucide-icon name="folder-git-2" [size]="40" class="repo-empty__svg"></lucide-icon>
    </div>
    <h2 class="repo-empty__title">No Repositories Yet</h2>
    <!-- <p class="repo-empty__text">
      Start by adding a GitHub repository to analyze its business logic and generate flowcharts
    </p>
    <button (click)="navigateToSettings()" class="repo-empty__btn">
      <lucide-icon name="plus" [size]="20"></lucide-icon>
      Add Your First Repository
    </button> -->
  </div>
}
